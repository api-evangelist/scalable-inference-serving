specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Scalable Inference Serving
providerId: scalable-inference-serving
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
- AI
- Inference
- Kubernetes
- Rate Limiting
description: Scalable Inference Serving does not publish public API rate limits reachable in this reconciliation
  pass; limits are governed by the customer's commercial / partner agreement. Consumers should honor 429
  / 503 responses where they appear and follow standard exponential-backoff guidance.
notes: Scalable Inference Serving is an aggregate index of open-source model-serving projects (KServe,
  BentoML, vLLM, NVIDIA Triton) rather than a single commercial provider. The component projects are free
  / Apache-2.0; cost arises from the underlying compute (GPUs, Kubernetes) on whichever cloud the operator
  runs them. No unified plans or pricing.
sources:
- https://kserve.github.io/website/
- https://docs.bentoml.com/
- https://docs.vllm.ai/
- https://github.com/triton-inference-server/server
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
- name: Contracted limits
  scope: account
  metric: varies
  limit: negotiated under commercial / partner agreement; not publicly published
policies:
- name: Backoff on 429
  description: Clients should implement exponential backoff with jitter on HTTP 429 responses, honoring
    the Retry-After header when present.
- name: Quota raise via account team
  description: Quota and rate-limit changes are coordinated through the Scalable Inference Serving account
    team or partner manager rather than self-service.
maintainers:
