description: Scalable Inference Serving does not publish self-service plans or pricing reachable in this
  reconciliation pass; commercial terms are handled by direct sales engagement. This artifact is intentionally
  trimmed to a single Contact Sales plan.
notes: Scalable Inference Serving is an aggregate index of open-source model-serving projects (KServe,
  BentoML, vLLM, NVIDIA Triton) rather than a single commercial provider. The component projects are free
  / Apache-2.0; cost arises from the underlying compute (GPUs, Kubernetes) on whichever cloud the operator
  runs them. No unified plans or pricing.
sources:
- https://kserve.github.io/website/
- https://docs.bentoml.com/
- https://docs.vllm.ai/
- https://github.com/triton-inference-server/server
plans:
- id: scalable-inference-serving-contact-sales
  name: Contact Sales
  type: enterprise
  description: Contact Scalable Inference Serving sales for commercial terms. No self-service plan or
    public unit pricing is available.
  entries:
  - label: Negotiated Commercial Terms
    name: negotiated_terms
    type: subscription
    metric: varies
    limit: -1
    timeFrame: year
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: false
  elements:
  - name: Custom-negotiated capacity
  - name: Enterprise support
  - name: Contractual SLA
