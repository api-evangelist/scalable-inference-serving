naftiko: "1.0.0-alpha1"

info:
  label: "KServe Open Inference Protocol API"
  description: >-
    Shared capability definition for the KServe Open Inference Protocol V2 API.
    Provides standardized REST endpoints for model inference, health probing,
    and metadata retrieval. Compatible with KServe (CNCF incubating), NVIDIA Triton,
    BentoML, TorchServe, and OpenVINO Model Server.
  tags:
    - CNCF
    - Inference
    - Kubernetes
    - Model Serving
    - Open Inference Protocol
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      KSERVE_BASE_URL: KSERVE_BASE_URL

capability:
  consumes:
    - type: http
      namespace: kserve
      baseUri: "{{env.KSERVE_BASE_URL}}"
      description: "KServe Open Inference Protocol V2 REST API"
      resources:
        - name: server-health
          path: /v2/health
          description: "Server liveness and readiness health endpoints"
          operations:
            - name: check-server-liveness
              method: GET
              description: "Check if the inference server is live and ready to receive requests"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: check-server-readiness
              method: GET
              description: "Check if all models are loaded and the server is ready for inference"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: server-metadata
          path: /v2
          description: "Server metadata and version information"
          operations:
            - name: get-server-metadata
              method: GET
              description: "Get server name, version, and supported protocol extensions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: model-health
          path: /v2/models/{model_name}/ready
          description: "Per-model readiness endpoint"
          operations:
            - name: check-model-readiness
              method: GET
              description: "Check if a specific model is ready for inference"
              inputParameters:
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "Name of the model to check"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: model-metadata
          path: /v2/models/{model_name}
          description: "Model metadata including input/output tensor specifications"
          operations:
            - name: get-model-metadata
              method: GET
              description: "Retrieve model name, versions, platform, and input/output tensor specs"
              inputParameters:
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "Name of the model"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: model-inference
          path: /v2/models/{model_name}/infer
          description: "Model inference execution endpoint"
          operations:
            - name: run-inference
              method: POST
              description: "Submit input tensors and receive model predictions"
              inputParameters:
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "Name of the model to run inference against"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.request_id}}"
                  inputs: "{{tools.inputs}}"
                  outputs: "{{tools.outputs}}"

        - name: model-version-inference
          path: /v2/models/{model_name}/versions/{model_version}/infer
          description: "Version-specific model inference"
          operations:
            - name: run-model-version-inference
              method: POST
              description: "Submit inference request to a specific model version for A/B testing or version pinning"
              inputParameters:
                - name: model_name
                  in: path
                  type: string
                  required: true
                  description: "Name of the model"
                - name: model_version
                  in: path
                  type: string
                  required: true
                  description: "Specific model version"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  id: "{{tools.request_id}}"
                  inputs: "{{tools.inputs}}"

  exposes:
    - type: rest
      port: 8100
      namespace: kserve-rest-api
      resources:
        - path: /v1/health/live
          name: server-liveness
          description: "Server liveness probe"
          operations:
            - method: GET
              name: check-server-liveness
              description: "Check server liveness"
              call: "kserve.check-server-liveness"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/health/ready
          name: server-readiness
          description: "Server readiness probe"
          operations:
            - method: GET
              name: check-server-readiness
              description: "Check server readiness"
              call: "kserve.check-server-readiness"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/models/{model_name}/metadata
          name: model-metadata
          description: "Model metadata retrieval"
          operations:
            - method: GET
              name: get-model-metadata
              description: "Get model tensor specs and platform info"
              call: "kserve.get-model-metadata"
              with:
                model_name: "rest.model_name"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/models/{model_name}/infer
          name: model-inference
          description: "Model inference"
          operations:
            - method: POST
              name: run-inference
              description: "Run model inference"
              call: "kserve.run-inference"
              with:
                model_name: "rest.model_name"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: kserve-mcp
      transport: http
      tools:
        - name: check-server-liveness
          description: "Check if the KServe inference server is live"
          hints:
            readOnly: true
            idempotent: true
          call: "kserve.check-server-liveness"
          outputParameters:
            - type: object
              mapping: "$."

        - name: check-server-readiness
          description: "Check if all models are ready for inference"
          hints:
            readOnly: true
            idempotent: true
          call: "kserve.check-server-readiness"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-server-metadata
          description: "Get inference server version and supported extensions"
          hints:
            readOnly: true
            idempotent: true
          call: "kserve.get-server-metadata"
          outputParameters:
            - type: object
              mapping: "$."

        - name: check-model-readiness
          description: "Check if a specific model is ready for inference"
          hints:
            readOnly: true
            idempotent: true
          call: "kserve.check-model-readiness"
          with:
            model_name: "tools.model_name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-model-metadata
          description: "Get model tensor specifications, platform, and available versions"
          hints:
            readOnly: true
            idempotent: true
          call: "kserve.get-model-metadata"
          with:
            model_name: "tools.model_name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: run-inference
          description: "Submit input tensors to a model and receive inference results"
          hints:
            readOnly: false
            idempotent: false
          call: "kserve.run-inference"
          with:
            model_name: "tools.model_name"
            request_id: "tools.request_id"
            inputs: "tools.inputs"
            outputs: "tools.outputs"
          outputParameters:
            - type: object
              mapping: "$."

        - name: run-model-version-inference
          description: "Run inference against a specific model version for A/B testing or pinned integration"
          hints:
            readOnly: false
            idempotent: false
          call: "kserve.run-model-version-inference"
          with:
            model_name: "tools.model_name"
            model_version: "tools.model_version"
            inputs: "tools.inputs"
          outputParameters:
            - type: object
              mapping: "$."
