principles:
- name: Visibility
  description: Consumption visibility comes from the Scalable Inference Serving account / partner reporting
    surface (invoices, account dashboards) rather than a public usage API.
- name: Allocation
  description: Allocate cost through the Scalable Inference Serving contract structure (entitlement, project,
    business unit) and reconcile against internal cost centers.
- name: Optimization
  description: 'Optimization levers are commercial: renegotiation cadence, commitment sizing, and consolidation
    of Scalable Inference Serving entitlements.'
- name: Accountability
  description: Assign a contract owner who reconciles Scalable Inference Serving invoices against contracted
    entitlements each billing cycle.
